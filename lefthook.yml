# lefthook.yml — Git hook 兜底
#
# 为什么需要这个：Cursor / Trae / Antigravity 等 IDE 没有原生 hook 系统。
# Kiro / Claude Code 有，但用户可能在不同 IDE 之间切换。
# git hook 是跨工具最稳的兜底——只要走 git 就一定执行。
#
# 安装：`npx lefthook install` 或 `brew install lefthook && lefthook install`
# 文档：https://lefthook.dev/

# ---------- 提交前 ----------
pre-commit:
  parallel: true
  commands:
    # 1) 边界检查：禁止跨层 import（具体规则见 .agent/core/boundaries.md）
    boundaries:
      glob: "*.{ts,tsx,js,jsx}"
      run: |
        if [ -f node_modules/.bin/dependency-cruiser ]; then
          npx dependency-cruiser --validate -- {staged_files}
        else
          echo "lefthook: dependency-cruiser 未安装，跳过边界检查"
        fi

    # 2) 校验 ADR 编号无冲突
    adr-id-uniqueness:
      glob: ".agent/adr/[0-9]*.md"
      run: |
        ids=$(ls .agent/adr/[0-9]*.md 2>/dev/null | sed -E 's|.*/([0-9]+)-.*|\1|' | sort)
        dup=$(echo "$ids" | uniq -d)
        if [ -n "$dup" ]; then
          echo "lefthook: ADR 编号冲突: $dup"
          exit 1
        fi

    # 3) 校验 flow 编号无冲突
    flow-id-uniqueness:
      glob: ".agent/flows/[0-9]*.md"
      run: |
        ids=$(ls .agent/flows/[0-9]*.md 2>/dev/null | sed -E 's|.*/([0-9]+)-.*|\1|' | sort)
        dup=$(echo "$ids" | uniq -d)
        if [ -n "$dup" ]; then
          echo "lefthook: FLOW 编号冲突: $dup"
          exit 1
        fi

    # 4) 提醒：自动生成的 map 文件不应被手编辑
    map-no-handedit:
      glob: ".agent/map/*"
      run: |
        for f in {staged_files}; do
          if grep -q "Generated by:" "$f"; then
            if ! git diff --cached "$f" | grep -q "^+.*Source-hash:"; then
              echo "lefthook: $f 是自动生成文件，请用 .agent/workflows/regenerate-map.md 重新生成而不是手动编辑"
              exit 1
            fi
          fi
        done

    # 5) IDE shim 必须与 .agent/ 真理源同步
    #    这是范式存活的关键：Kiro 不会递归解析 #[[file:...]]，所以 shim 必须
    #    通过 scripts/sync-shims.sh 内联编译。.agent/ 改了未重编译则 commit 失败。
    shim-in-sync:
      run: |
        # 只有当 .agent/core/* 或 .agent/skills/agent-discipline.md 或某个
        # _index.md 在本次提交中被修改时才检查
        triggers=$(echo "{staged_files}" | tr ' ' '\n' | grep -E '^\.agent/(core/|skills/agent-discipline\.md|adr/_index|flows/_index|sub-agents/_index|workflows/_index|skills/_index)' || true)
        if [ -n "$triggers" ]; then
          if ! bash scripts/sync-shims.sh --check; then
            echo ""
            echo "lefthook: .agent/ 真理源已变更但 IDE shim 未重新编译。"
            echo "         运行: bash scripts/sync-shims.sh && git add ."
            exit 1
          fi
        fi

    # 6) 直接编辑 AUTO-GENERATED shim 是错误
    no-edit-generated-shims:
      glob: ".kiro/steering/*.md,.cursor/rules/*.mdc,.claude/CLAUDE.md,.antigravity/AGENTS.md"
      run: |
        for f in {staged_files}; do
          if [ -f "$f" ] && head -3 "$f" | grep -q "AUTO-GENERATED by scripts/sync-shims.sh"; then
            # 检查改动是否破坏了 AUTO-GENERATED 头
            if ! git diff --cached "$f" | grep -qE "^[+-].*AUTO-GENERATED"; then
              # 文件被改但头还在——意味着用户改了正文。这是错误。
              if git diff --cached --quiet "$f"; then
                continue
              fi
              echo "lefthook: $f 是自动生成的 shim。请编辑 .agent/ 中的源文件，然后跑 scripts/sync-shims.sh"
              exit 1
            fi
          fi
        done

    # 7) 自动静默备份 Antigravity 本地规划文件（若检测到脑目录存在）
    antigravity-auto-backup:
      run: |
        if [ -d "${HOME}/.gemini/antigravity-ide/brain" ] && [ -f scripts/antigravity-sync.sh ]; then
          echo "lefthook: 检测到 Antigravity 开发环境，开始静默备份规划文件..."
          bash scripts/antigravity-sync.sh backup || echo "lefthook: 自动备份失败，跳过"
          git add .agent/sessions/*/antigravity/*.md 2>/dev/null || true
        fi

# ---------- 提交消息 ----------
commit-msg:
  commands:
    # Conventional Commits + 鼓励引用 ADR / flow / 原则
    format:
      run: |
        msg=$(cat {1})
        # Conventional commit 类型
        if ! echo "$msg" | grep -qE "^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\(.+\))?!?: .+"; then
          echo "lefthook: commit message 不符合 Conventional Commits 规范"
          echo "  期望: feat: ... / fix(scope): ... / refactor!: ..."
          exit 1
        fi
        # 提示（不阻断）：是否引用了决策容器
        if ! echo "$msg" | grep -qE "(ADR-[0-9]{4}|FLOW-[0-9]{3}|P[0-9])"; then
          echo "lefthook: 提示：commit 没有引用 ADR / FLOW / 原则。如有权衡建议引用。"
        fi

# ---------- 推送前 ----------
pre-push:
  parallel: true
  commands:
    # 跑测试（如果存在）
    test:
      run: |
        if [ -f package.json ] && grep -q '"test"' package.json; then
          npm test --silent
        fi

    # map 失配警告（不阻断）
    map-staleness:
      run: |
        if [ -d .agent/map ]; then
          echo "lefthook: 提示：如果 .agent/map/* 的 Source-hash 已失配，建议下次会话开始时跑 .agent/workflows/regenerate-map.md"
        fi

# ---------- 注释 ----------
# 不在 lefthook 里跑的事（因为它们是 agentic，不是 deterministic）：
#   - regenerate-map（agent 跑）
#   - impact-analyzer（agent 跑）
#   - verifier（agent 跑，因为要解读结果）
#   - visual-reviewer（需要浏览器 + 模型）
# 这些事在 IDE hook 中由 agent 触发；git hook 只做**确定性的、快速的**校验兜底。
